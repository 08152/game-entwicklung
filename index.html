<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Entwicklerseite</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; }
header { background-color: #222; color: white; padding: 20px; text-align: center; }
#searchBar { width: 80%; padding: 10px; font-size: 16px; margin-top: 10px; }
.container { padding: 20px; }

/* Profile-Liste */
.profile {
    background-color: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.profile:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    background-color: #f9f9f9;
}

.profile img { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; }
.profile-info { flex: 1; }

/* Overlay */
#overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
#overlayContent { background:white; padding:20px; border-radius:15px; width: 90%; max-width:500px; text-align:center; position:relative; }
#overlayContent img { max-width: 100%; border-radius:10px; margin-bottom:10px; }
#closeOverlay { position:absolute; top:10px; right:10px; background:#222; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer; }
#closeOverlay:hover { background:#555; }
#detailEmail { color: blue; text-decoration: underline; cursor: pointer; }
#copyMessage { color: green; margin-top: 5px; display: none; }

footer { text-align:center; margin-top:20px; padding:10px; background:#222; color:white; }
footer a { color: #00f; text-decoration: underline; margin: 0 10px; }
</style>
</head>
<body>

<header>
    <h1>Programmierer & Spiele-Suche</h1>
    <input type="text" id="searchBar" placeholder="Suche...">
</header>

<div class="container" id="profilesList">
    <!-- Profile erscheinen hier -->
</div>

<!-- Overlay für Detailansicht -->
<div id="overlay">
    <div id="overlayContent">
        <button id="closeOverlay" onclick="closeOverlay()">X</button>
        <img id="detailImage" src="" alt="Profilbild">
        <h2 id="detailName"></h2>
        <p id="detailBio"></p>
        <p>Email: <span id="detailEmail"></span></p>
        <p id="copyMessage">E-Mail kopiert!</p>
    </div>
</div>

<footer>
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutzerklärung</a>
</footer>

<script>
// Entwicklerdaten
const profiles = [
    {
        name: "Risky Life",
        bio: "Erfahrener 2-D Spielprogramierer, sehr erfolgreich in Shootern",
        email: "RiskyLife@proton.me",
        image: "https://chatgpt.com/backend-api/estuary/content?id=file_00000000f5247246b9734fc5cd4f4e7d&ts=492784&p=fs&cid=1&sig=6721fa09e2babeecf647d40e91b76a68810184f4fc5fb0f6a0263a1bbc04a11f&v=0"
    }
];

// Profile rendern
function renderProfiles(filter=""){
    const list = document.getElementById("profilesList");
    list.innerHTML = "";
    profiles.filter(p => 
        p.name.toLowerCase().includes(filter.toLowerCase()) ||
        p.bio.toLowerCase().includes(filter.toLowerCase()) ||
        p.email.toLowerCase().includes(filter.toLowerCase())
    ).forEach(p => {
        const div = document.createElement("div");
        div.className = "profile";
        div.innerHTML = `
            <img src="${p.image}" alt="Profilbild">
            <div class="profile-info">
                <p><strong>${p.name}</strong></p>
                <p>${p.bio}</p>
                <p>${p.email}</p>
            </div>
        `;
        div.onclick = () => showOverlay(p);
        list.appendChild(div);
    });
}

// Overlay öffnen
function showOverlay(profile){
    document.getElementById("detailImage").src = profile.image;
    document.getElementById("detailName").textContent = profile.name;
    document.getElementById("detailBio").textContent = profile.bio;
    const emailSpan = document.getElementById("detailEmail");
    emailSpan.textContent = profile.email;
    document.getElementById("copyMessage").style.display = "none";

    emailSpan.onclick = () => {
        navigator.clipboard.writeText(profile.email).then(() => {
            document.getElementById("copyMessage").style.display = "block";
        });
    }

    document.getElementById("overlay").style.display = "flex";
}

// Overlay schließen
function closeOverlay(){
    document.getElementById("overlay").style.display = "none";
}

// Suchfunktion
document.getElementById("searchBar").addEventListener("input", function(){
    renderProfiles(this.value);
});

// Initial render
renderProfiles();
</script>

</body>
</html>
